<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Mentor PDI{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Sora', 'sans-serif'],
            body: ['IBM Plex Sans', 'sans-serif'],
            mono: ['IBM Plex Mono', 'monospace'],
          },
          colors: {
            ink: '#0a0a0b',
            panel: '#141416',
            line: '#27272a',
            amber: { DEFAULT: '#f59e0b', soft: '#fbbf24' },
          },
        },
      },
    }
  </script>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-ink text-zinc-200 font-body min-h-screen antialiased">
  <div class="glow"></div>
  <nav class="border-b border-line/70 sticky top-0 z-20 backdrop-blur bg-ink/80">
    <div class="max-w-6xl mx-auto px-5 h-16 flex items-center justify-between">
      <a href="/" class="font-display font-extrabold text-lg tracking-tight text-white flex items-center gap-2">
        <span class="text-amber">&#9650;</span> Mentor<span class="text-amber">PDI</span>
      </a>
      <div class="flex items-center gap-5 text-sm">
        {% if request.session.get('user_id') %}
          <a href="/dashboard" class="hover:text-white transition">Painel</a>
          <a href="/pdi/novo" class="hover:text-white transition">Novo PDI</a>
          <a href="/logout" class="text-zinc-400 hover:text-amber transition">Sair</a>
        {% else %}
          <a href="/login" class="hover:text-white transition">Entrar</a>
          <a href="/register" class="bg-amber text-ink font-semibold px-4 py-1.5 rounded-md hover:bg-amber-soft transition">Criar conta</a>
        {% endif %}
      </div>
    </div>
  </nav>

  <main class="max-w-6xl mx-auto px-5 py-10 relative z-10">
    {% block content %}{% endblock %}
  </main>

  <footer class="border-t border-line/70 mt-16">
    <div class="max-w-6xl mx-auto px-5 py-6 text-xs text-zinc-500 flex justify-between flex-wrap gap-2">
      <span>MentorPDI &middot; Mentor de carreira em TI com IA</span>
      <span class="font-mono">FastAPI &middot; SQLModel &middot; Google Gemini</span>
    </div>
  </footer>
</body>
</html>
