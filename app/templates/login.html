{% extends "base.html" %}
{% block title %}Entrar - MentorPDI{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-8 rise rise-1">
  <h1 class="font-display font-bold text-2xl text-white mb-1">Entrar</h1>
  <p class="text-zinc-400 text-sm mb-6">Acesse seu painel de PDIs.</p>

  {% if erro %}
  <div class="bg-red-500/10 border border-red-500/40 text-red-300 text-sm rounded-md px-4 py-2 mb-4">{{ erro }}</div>
  {% endif %}

  <form method="post" action="/login" class="bg-panel border border-line rounded-xl p-6 space-y-4">
    <div>
      <label class="block text-sm text-zinc-400 mb-1">Usuario</label>
      <input name="username" required class="w-full bg-ink border border-line rounded-md px-3 py-2 text-white focus:border-amber focus:outline-none">
    </div>
    <div>
      <label class="block text-sm text-zinc-400 mb-1">Senha</label>
      <input name="password" type="password" required class="w-full bg-ink border border-line rounded-md px-3 py-2 text-white focus:border-amber focus:outline-none">
    </div>
    <button class="w-full bg-amber text-ink font-semibold py-2.5 rounded-md hover:bg-amber-soft transition">Entrar</button>
  </form>

  <p class="text-center text-sm text-zinc-500 mt-4">
    Nao tem conta? <a href="/register" class="text-amber hover:underline">Criar agora</a>
  </p>
</div>
{% endblock %}
